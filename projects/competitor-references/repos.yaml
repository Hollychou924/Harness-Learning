    desc: PC 桌面应用，窗口化运行，Tauri/Electron 为主
    count: 8
  "02-cli-terminals":
    desc: CLI / 终端工具，纯命令行交互
    count: 5
  "03-cli-multi-form":
    desc: CLI 为主、多形态扩展，同代码库延伸桌面/Web/IDE

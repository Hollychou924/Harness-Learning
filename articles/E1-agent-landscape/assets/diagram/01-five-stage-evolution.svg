<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', monospace; }
  </style>

  <rect width="800" height="720" fill="#0f172a"/>
  <rect width="800" height="720" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="40" fill="white" font-size="16" font-weight="700" text-anchor="middle">AI Agent Harness 五阶段演进</text>

  <!-- Stage 1 -->
  <rect x="250" y="80" width="300" height="65" rx="25" fill="#0f172a"/>
  <rect x="250" y="80" width="300" height="65" rx="25" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="265" y="108" fill="white" font-size="10" font-weight="600">① 固定 Prompt</text>
  <text x="265" y="128" fill="#94a3b8" font-size="9">解决"怎么把任务说清楚"</text>

  <line x1="400" y1="145" x2="400" y2="175" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Stage 2 -->
  <rect x="250" y="180" width="300" height="65" rx="6" fill="#0f172a"/>
  <rect x="250" y="180" width="300" height="65" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="265" y="208" fill="white" font-size="10" font-weight="600">② 动态 Prompt + Context</text>
  <text x="265" y="228" fill="#94a3b8" font-size="9">解决"怎么让模型看到对的材料"</text>

  <line x1="400" y1="245" x2="400" y2="275" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- Stage 3 -->
  <rect x="250" y="280" width="300" height="65" rx="6" fill="#0f172a"/>
  <rect x="250" y="280" width="300" height="65" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="265" y="308" fill="white" font-size="10" font-weight="600">③ Harness</text>
  <text x="265" y="328" fill="#94a3b8" font-size="9">解决"怎么在边界里可靠执行"</text>

  <line x1="400" y1="345" x2="400" y2="375" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Stage 4 -->
  <rect x="250" y="380" width="300" height="65" rx="6" fill="#0f172a"/>
  <rect x="250" y="380" width="300" height="65" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="265" y="408" fill="white" font-size="10" font-weight="600">④ ETCLOVG 七层分类</text>
  <text x="265" y="428" fill="#94a3b8" font-size="9">解决"怎么拆成可评审、可验收的模块"</text>

  <line x1="400" y1="445" x2="400" y2="475" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- Stage 5 -->
  <rect x="250" y="480" width="300" height="65" rx="6" fill="#0f172a"/>
  <rect x="250" y="480" width="300" height="65" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="265" y="508" fill="white" font-size="10" font-weight="600">⑤ 自进化 Harness</text>
  <text x="265" y="528" fill="#94a3b8" font-size="9">解决"怎么把执行经验变成下次能力"</text>

  <!-- Loop-back arrow -->
  <path d="M 550 512 Q 620 512 620 380 Q 620 248 550 248" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-cyan)"/>
  <text x="640" y="385" fill="#fbbf24" font-size="8" transform="rotate(90,640,385)">经验回流</text>

  <!-- Legend -->
  <rect x="230" y="600" width="340" height="55" rx="6" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="280" y="620" fill="#94a3b8" font-size="8">每一阶段是针对上一阶段短板的工程化回应</text>
  <text x="280" y="640" fill="#94a3b8" font-size="8">"Prompt 是入口，Context 决定可用度，Harness 决定能不能进生产"</text>
</svg>

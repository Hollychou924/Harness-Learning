<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', monospace; }
  </style>

  <rect width="800" height="620" fill="#0f172a"/>
  <rect width="800" height="620" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="40" fill="white" font-size="16" font-weight="700" text-anchor="middle">AIPM 双核能力闭环</text>

  <!-- Node 1: 架构设计 (top) -->
  <rect x="280" y="80" width="240" height="80" rx="8" fill="#0f172a"/>
  <rect x="280" y="80" width="240" height="80" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="2"/>
  <text x="400" y="112" fill="white" font-size="13" font-weight="700" text-anchor="middle">架构设计</text>
  <text x="400" y="132" fill="#94a3b8" font-size="9" text-anchor="middle">角色边界 · 流程编排 · 安全护栏</text>
  <text x="400" y="148" fill="#94a3b8" font-size="9" text-anchor="middle">记忆工具 · 多 Agent 协作</text>

  <!-- Arrow: 架构设计 → 系统实现 (right) -->
  <line x1="520" y1="120" x2="610" y2="190" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="555" y="140" fill="#22d3ee" font-size="8">"做什么"</text>

  <!-- Node 2: 系统实现 (right) -->
  <rect x="570" y="190" width="200" height="70" rx="8" fill="#0f172a"/>
  <rect x="570" y="190" width="200" height="70" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="670" y="218" fill="white" font-size="12" font-weight="600" text-anchor="middle">系统实现</text>
  <text x="670" y="240" fill="#94a3b8" font-size="9" text-anchor="middle">工程落地 · Harness 搭建</text>

  <!-- Arrow: 系统实现 → 评估测试 (bottom) -->
  <line x1="670" y1="260" x2="670" y2="350" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Node 3: 评估测试 (bottom) -->
  <rect x="570" y="350" width="200" height="70" rx="8" fill="#0f172a"/>
  <rect x="570" y="350" width="200" height="70" rx="8" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="670" y="378" fill="white" font-size="12" font-weight="600" text-anchor="middle">评估测试</text>
  <text x="670" y="400" fill="#94a3b8" font-size="9" text-anchor="middle">多维指标 · 可观测 · 量化评测</text>

  <!-- Arrow: 评估测试 → 错误归因 (left) -->
  <line x1="570" y1="385" x2="490" y2="440" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="540" y="425" fill="#a78bfa" font-size="8">"做得好不好"</text>

  <!-- Node 4: 错误归因 (left) -->
  <rect x="30" y="440" width="200" height="70" rx="8" fill="#0f172a"/>
  <rect x="30" y="440" width="200" height="70" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="130" y="468" fill="white" font-size="12" font-weight="600" text-anchor="middle">错误归因</text>
  <text x="130" y="490" fill="#94a3b8" font-size="9" text-anchor="middle">架构 · Prompt · 工具 · 模型？</text>

  <!-- Arrow: 错误归因 → 架构设计 (top-left loop) -->
  <path d="M 130 440 Q 130 380 30 380 L 30 120 Q 30 80 80 80 L 275 80" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="20" y="280" fill="#fbbf24" font-size="8" transform="rotate(-90,20,280)">"怎么做得更好"</text>

  <!-- Center: label -->
  <text x="400" y="310" fill="#64748b" font-size="10" text-anchor="middle">持续进化闭环</text>

  <!-- Bottom section: Why these two are irreplaceable -->
  <rect x="30" y="540" width="740" height="65" rx="6" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="400" y="560" fill="#94a3b8" font-size="9" text-anchor="middle">传统 PM 设计"功能" → AIPM 设计"能自主完成任务的智能系统"</text>
  <text x="400" y="578" fill="#64748b" font-size="8" text-anchor="middle">工程师实现架构但不设计架构 · 数据科学家分析数据但不定义"业务上的好" · 模型研究员优化模型但不做产品</text>
  <text x="400" y="594" fill="#64748b" font-size="8" text-anchor="middle">只有 AIPM 站在业务 + 用户 + 技术交叉点，同时具备架构设计（骨架）和评估能力（眼睛）</text>
</svg>
